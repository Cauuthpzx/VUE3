<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="maxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f1e"/>
      <stop offset="100%" stop-color="#101830"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc2040"/>
      <stop offset="50%" stop-color="#e03050"/>
      <stop offset="100%" stop-color="#cc2040"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc2040"/>
      <stop offset="100%" stop-color="#e03050"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.25)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#cc2040" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g transform="translate(8, 7)">
    <path d="M18 0 L36 18 L18 36 L0 18 Z" fill="url(#iconGrad)" opacity="0.18"/>
    <path d="M7 26 L7 12 L12 12 L18 20 L24 12 L29 12 L29 26" fill="none" stroke="url(#iconGrad)" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="7" cy="10" r="2.3" fill="#cc2040"/>
    <circle cx="29" cy="10" r="2.3" fill="#e03050"/>
    <circle cx="18" cy="4" r="1.8" fill="#cc2040" opacity="0.85"/>
    <path d="M13 6 Q18 1 23 6" fill="none" stroke="#cc2040" stroke-width="1.2" stroke-linecap="round" opacity="0.65"/>
    <path d="M10 8 Q18 -1 26 8" fill="none" stroke="#cc2040" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>

  <text x="52" y="34" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="800" fill="url(#maxGrad)" letter-spacing="-1">
    Max
  </text>

  <g filter="url(#shadow)">
    <rect x="118" y="10" width="74" height="30" rx="6" fill="url(#hubGrad)"/>
    <rect x="118" y="10" width="74" height="15" rx="6" fill="url(#shine)" opacity="0.4"/>
    <text x="155" y="31" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="19" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="3">
      HUB
    </text>
  </g>

  <line x1="52" y1="39" x2="112" y2="39" stroke="#cc2040" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
</svg>
